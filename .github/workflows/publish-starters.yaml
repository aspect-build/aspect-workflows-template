name: Publish starter repos

# Renders every preset from this repo and force-pushes each to its own
# template repository under github.com/aspect-starters, giving users a
# "Use this template" / Fork / clone experience. Runs on release tags and
# manual dispatch.
#
# Auth: a GitHub App installed on the aspect-starters org. For steady-state
# publishing the App needs `Contents: write` (push the rendered tree) AND
# `Workflows: write` (the rendered tree includes .github/workflows/ci.yaml;
# GitHub rejects pushing workflow files via an App token that lacks this).
# Store the App's id and private key as repo secrets:
#   - secrets.STARTERS_APP_ID
#   - secrets.STARTERS_APP_PRIVATE_KEY
# Also requires secrets.ASPECT_API_TOKEN to install the Aspect CLI.
#
# (Bootstrapping a brand-new preset repo or toggling is_template needs
# `Administration: write`; those steps below are best-effort and are skipped
# without that permission, since all current repos are already provisioned.)
on:
  # Releases sync via tag.yaml's `sync-starters` job (an explicit dispatch),
  # because GitHub suppresses ref events from the GITHUB_TOKEN-pushed release
  # tag. This `push: tags` trigger is the fallback for a tag pushed by hand.
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit, tag, or branch of this repo to render from (default: this workflow's ref)"
        type: string
        default: ""
      dry_run:
        description: "Render + commit locally but do not push"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        preset:
          - minimal
          - shell
          - go
          - js
          - py
          - java
          - kotlin
          - cpp
          - rust
          - ruby
          - scala
          - kitchen-sink
    runs-on: ubuntu-latest
    steps:
      # On a release-tag push, checkout defaults to that tag. On manual dispatch,
      # render from the requested ref (or this workflow's ref when unset).
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      # Mint a short-lived token for the aspect-starters org from the GitHub App.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.STARTERS_APP_ID }}
          private-key: ${{ secrets.STARTERS_APP_PRIVATE_KEY }}
          owner: aspect-starters
          repositories: ${{ matrix.preset }}

      - uses: aspect-build/setup-aspect@b7443e6f0b4a72507d73fcc49c16eecaf28786f9 # v2026.26.7
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}

      - name: Render preset
        run: |
          # aspect-starters repos ship Apache-2.0; `aspect init` defaults to none.
          aspect render-preset --preset='${{ matrix.preset }}' --out="$RUNNER_TEMP/out" --name=my_project --license=Apache-2.0
          echo "WS=$RUNNER_TEMP/out" >> "$GITHUB_ENV"

      - name: Post-scaffold (repin, normalize formatting, commit)
        working-directory: ${{ env.WS }}
        run: |
          # Mirror the template repo's own post-scaffold CI step so the published
          # starter is byte-for-byte what that CI validates — otherwise the
          # downstream repo's buildifier/gazelle/format jobs fail on the raw
          # render (jinja block-stripping leaves stray blank lines, etc.).
          #
          # repin — the template ships placeholder lockfiles; regenerate them.
          if [ -x ./tools/repin ]; then ./tools/repin || true; fi
          bazel mod deps --lockfile_mode=update || true
          # git init FIRST — gazelle/format need a git tree to enumerate + apply.
          git init -q
          git checkout -q -b main
          git config user.email "marvin@aspect.build"
          git config user.name "Marvin, the Aspect bot"
          git add -A
          git commit -q -m "Generated from aspect-workflows-template ${{ github.ref_name }}"
          # Normalize: buildifier for Starlark, gazelle for BUILD files, aspect
          # format for sources (skip presets with no source formatter). --scope=all
          # since there's no base ref to diff against. Then amend the commit.
          bazel run --run_in_cwd @buildifier_prebuilt//buildifier -- -r . || true
          aspect gazelle --task:name publish-gazelle --check-only=false || true
          case "${{ matrix.preset }}" in
            minimal|scala|ruby) ;;
            *) aspect format --task:name publish-format --scope=all || true ;;
          esac
          git add -A
          git commit -q --amend --no-edit

      - name: Ensure template repository (best-effort; needs Administration:write)
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          repo="aspect-starters/${{ matrix.preset }}"
          gh api -X PATCH "repos/$repo" -f is_template=true >/dev/null 2>&1 \
            || echo "note: could not set is_template (already set, or token lacks Administration:write) — continuing"

      - name: Force-push to aspect-starters/${{ matrix.preset }}
        if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
        working-directory: ${{ env.WS }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          repo="aspect-starters/${{ matrix.preset }}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git"
          git push --force origin main
