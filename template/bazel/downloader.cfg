# Bazel downloader config — wired up via `--downloader_config` in .bazelrc.
# Use it to route downloads through a private/mirror host or to add fallback
# mirrors for flaky upstreams. See
# https://aspect.build/blog/configuring-bazels-downloader and
# https://bazel.build/reference/command-line-reference#flag--downloader_config
#
# Examples:
#   # Send all github.com downloads through an internal mirror first.
#   rewrite github.com/(.*) my-mirror.internal/github/$1
#   # Add a fallback mirror for a flaky host.
#   rewrite ftp.gnu.org/(.*) https://ftpmirror.gnu.org/$1
